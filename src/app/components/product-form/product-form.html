<div class="container">
  <h2>{{ isEditMode() ? 'Editar Producto' : 'Nuevo Producto' }}</h2>

  <form (ngSubmit)="onSubmit()" #productForm="ngForm" class="form">
    <div class="form-group">
      <label for="name">Nombre</label>
      <input
        type="text"
        id="name"
        name="name"
        [(ngModel)]="product.name"
        required
        placeholder="Nombre del producto"
      />
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea
        id="description"
        name="description"
        [(ngModel)]="product.description"
        required
        rows="3"
        placeholder="Descripción del producto"
      ></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="price">Precio</label>
        <input
          type="number"
          id="price"
          name="price"
          [(ngModel)]="product.price"
          required
          min="0"
          placeholder="0.00"
        />
      </div>

      <div class="form-group">
        <label for="stock">Stock</label>
        <input
          type="number"
          id="stock"
          name="stock"
          [(ngModel)]="product.stock"
          required
          min="0"
          placeholder="0"
        />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!productForm.valid">
        {{ isEditMode() ? 'Actualizar' : 'Guardar' }}
      </button>
      <a routerLink="/products" class="btn btn-cancel">Cancelar</a>
    </div>
  </form>
</div>
